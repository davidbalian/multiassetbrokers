    <div
      class="container mb-5"
      data-cms-content-wrapper="../_layouts/default.html"
    >
      <h1>Contact us</h1>

      <div class="row py-4">
        <div class="col-md-12">
          <div class="well well-sm">
            <form action="#" class="form-horizontal" id="contactform" method="">
              <fieldset>
                <!-- Name input-->
                <div class="form-group">
                  <label class="col-md-3 control-label" for="name">Name</label>
                  <div class="col-md-9">
                    <input
                      class="form-control"
                      id="name"
                      name="name"
                      placeholder="Your name"
                      type="text"
                    />
                  </div>
                </div>
                <!-- Email input-->
                <div class="form-group">
                  <label class="col-md-3 control-label" for="email"
                    >Your E-mail</label
                  >
                  <div class="col-md-9">
                    <input
                      class="form-control"
                      id="email"
                      name="email"
                      placeholder="Your email"
                      type="text"
                    />
                  </div>
                </div>
                <!-- Message body -->
                <div class="form-group">
                  <label class="col-md-3 control-label" for="message"
                    >Your message</label
                  >
                  <div class="col-md-9">
                    <textarea
                      class="form-control"
                      id="message"
                      name="message"
                      placeholder="Please enter your message here..."
                      rows="5"
                    ></textarea>
                  </div>
                </div>
                <!-- Form actions -->
                <div class="form-group">
                  <div class="col-md-12">
                    <button class="btn btn-primary" type="submit">
                      Submit
                    </button>
                  </div>
                </div>
              </fieldset>
            </form>
          </div>
        </div>
        <div class="invisible" id="thankyou">
          <h2>Thanks!! Your message was sent. We will contact you soon!</h2>
        </div>
        <script src="../../ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
        <script type="text/javascript">
          $("#contactform").submit(function (event) {
            event.preventDefault();
            $.post(
              "https://hooks.zapier.com/hooks/catch/1463976/o5asj1q/",
              $(this).serialize(),
              function (response) {
                if (response.result === "error") {
                  console.log(response.message);
                  return;
                }
                // update view
                $("#contactform").addClass("invisible");
                $("#thankyou").toggleClass("invisible");
              },
              "json"
            );
          });
        </script>
      </div>
